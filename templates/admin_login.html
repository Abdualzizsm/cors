<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول للوحة التحكم - Shifra</title>
    <!-- إضافة Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            max-width: 120px;
        }
        .form-floating {
            margin-bottom: 20px;
        }
        .btn-login {
            background-color: #dc3545;
            border-color: #dc3545;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .btn-login:hover, .btn-login:focus {
            background-color: #c82333;
            border-color: #bd2130;
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="logo">
                <img src="{{ url_for('static', filename='favicon.ico') }}" alt="Shifra Logo">
                <h2 class="mt-3">لوحة تحكم شيفرة</h2>
                <p class="text-muted">الرجاء إدخال كلمة المرور للوصول إلى لوحة التحكم</p>
                <p class="text-muted"><small>كلمة المرور الافتراضية: 3762</small></p>
            </div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="كلمة المرور" required>
                    <label for="password">كلمة المرور</label>
                </div>
                <button type="submit" class="btn btn-primary btn-login">تسجيل الدخول</button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="{{ url_for('index') }}" class="text-decoration-none">العودة إلى الموقع الرئيسي</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
