<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="600px" viewBox="0 0 800 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Background Elements -->
        <circle fill="#E3F2FD" cx="400" cy="300" r="250"/>
        <path d="M300,200 C400,150 500,150 600,200" stroke="#90CAF9" stroke-width="4"/>
        <path d="M200,300 C300,250 400,250 500,300" stroke="#90CAF9" stroke-width="4"/>
        <path d="M300,400 C400,350 500,350 600,400" stroke="#90CAF9" stroke-width="4"/>
        
        <!-- Code Window -->
        <rect fill="#FFFFFF" x="250" y="150" width="300" height="200" rx="10"/>
        <rect fill="#1976D2" x="250" y="150" width="300" height="30" rx="10"/>
        <circle fill="#FF5252" cx="270" cy="165" r="5"/>
        <circle fill="#FFEB3B" cx="290" cy="165" r="5"/>
        <circle fill="#4CAF50" cx="310" cy="165" r="5"/>
        
        <!-- Code Lines -->
        <rect fill="#E3F2FD" x="270" y="200" width="200" height="10" rx="5"/>
        <rect fill="#E3F2FD" x="270" y="220" width="150" height="10" rx="5"/>
        <rect fill="#E3F2FD" x="270" y="240" width="180" height="10" rx="5"/>
        <rect fill="#E3F2FD" x="270" y="260" width="160" height="10" rx="5"/>
        <rect fill="#E3F2FD" x="270" y="280" width="190" height="10" rx="5"/>
        
        <!-- Decorative Elements -->
        <circle fill="#1976D2" cx="150" cy="150" r="20"/>
        <circle fill="#1976D2" cx="650" cy="450" r="20"/>
        <circle fill="#90CAF9" cx="200" cy="400" r="15"/>
        <circle fill="#90CAF9" cx="600" cy="200" r="15"/>
        
        <!-- Brackets -->
        <text font-family="Monaco" font-size="100" fill="#1976D2" x="180" y="350">{</text>
        <text font-family="Monaco" font-size="100" fill="#1976D2" x="580" y="350">}</text>
    </g>
</svg>
