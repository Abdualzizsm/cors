<?xml version="1.0" encoding="UTF-8"?>
<svg width="800px" height="600px" viewBox="0 0 800 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- المربع الرئيسي -->
    <g transform="translate(250,100)">
        <!-- الإطار الخارجي -->
        <rect x="0" y="0" width="300" height="300" 
              fill="none" 
              stroke="#00ffff" 
              stroke-width="4"
              rx="10"
              ry="10">
            <animate attributeName="stroke-opacity"
                     values="0.6;1;0.6"
                     dur="2s"
                     repeatCount="indefinite"/>
        </rect>

        <!-- الخطوط الداخلية -->
        <line x1="0" y1="150" x2="300" y2="150" 
              stroke="#00ffff" 
              stroke-width="2" 
              stroke-opacity="0.4"/>
        <line x1="150" y1="0" x2="150" y2="300" 
              stroke="#00ffff" 
              stroke-width="2" 
              stroke-opacity="0.4"/>

        <!-- الأرقام في المربعات -->
        <!-- المربع العلوي الأيسر -->
        <text x="75" y="90" 
              font-family="monospace" 
              font-size="40" 
              fill="#00ffff" 
              text-anchor="middle"
              opacity="0.8">
            1 0
            <animate attributeName="opacity"
                     values="0.8;1;0.8"
                     dur="1.5s"
                     repeatCount="indefinite"/>
        </text>

        <!-- المربع العلوي الأيمن -->
        <text x="225" y="90" 
              font-family="monospace" 
              font-size="40" 
              fill="#00ffff" 
              text-anchor="middle"
              opacity="0.8">
            0 1
            <animate attributeName="opacity"
                     values="0.8;1;0.8"
                     dur="1.8s"
                     repeatCount="indefinite"/>
        </text>

        <!-- المربع السفلي الأيسر -->
        <text x="75" y="240" 
              font-family="monospace" 
              font-size="40" 
              fill="#00ffff" 
              text-anchor="middle"
              opacity="0.8">
            1 1
            <animate attributeName="opacity"
                     values="0.8;1;0.8"
                     dur="2s"
                     repeatCount="indefinite"/>
        </text>

        <!-- المربع السفلي الأيمن -->
        <text x="225" y="240" 
              font-family="monospace" 
              font-size="40" 
              fill="#00ffff" 
              text-anchor="middle"
              opacity="0.8">
            0 0
            <animate attributeName="opacity"
                     values="0.8;1;0.8"
                     dur="1.7s"
                     repeatCount="indefinite"/>
        </text>

        <!-- النقاط في الزوايا -->
        <circle cx="0" cy="0" r="4" fill="#00ffff">
            <animate attributeName="r"
                     values="4;6;4"
                     dur="2s"
                     repeatCount="indefinite"/>
        </circle>
        <circle cx="300" cy="0" r="4" fill="#00ffff">
            <animate attributeName="r"
                     values="4;6;4"
                     dur="2s"
                     repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="300" r="4" fill="#00ffff">
            <animate attributeName="r"
                     values="4;6;4"
                     dur="2s"
                     repeatCount="indefinite"/>
        </circle>
        <circle cx="300" cy="300" r="4" fill="#00ffff">
            <animate attributeName="r"
                     values="4;6;4"
                     dur="2s"
                     repeatCount="indefinite"/>
        </circle>
    </g>
</svg>
