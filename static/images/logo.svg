<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="250" cy="250" r="240" fill="#2563eb" opacity="0.1"/>
    
    <!-- AI Brain Circuit Design -->
    <g fill="none" stroke="#2563eb" stroke-width="8">
        <!-- Circuit Lines -->
        <path d="M100,250 L400,250" />
        <path d="M250,100 L250,400" />
        <path d="M150,150 L350,350" />
        <path d="M150,350 L350,150" />
        
        <!-- Connection Points -->
        <circle cx="250" cy="250" r="15" fill="#2563eb"/>
