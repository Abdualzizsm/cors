        <circle cx="350" cy="350" r="10" fill="#2563eb"/>
        <circle cx="150" cy="350" r="10" fill="#2563eb"/>
        <circle cx="350" cy="150" r="10" fill="#2563eb"/>
    </g>
    
    <!-- Text Elements -->
    <g font-family="Arial, sans-serif" fill="#2563eb">
        <text x="250" y="450" text-anchor="middle" font-size="40" font-weight="bold">AI Programming</text>
        <text x="250" y="480" text-anchor="middle" font-size="25">تعلم البرمجة بالذكاء الاصطناعي</text>
